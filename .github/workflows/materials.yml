# Participant-site publication and migration gates.
# The commands below are the canonical local commands from the v3 specification.
name: materials

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "index.html"
      - "assets/**"
      - "materials/**"
      - "toolkit/**"
      - "participant-starter/**"
      - "reference-app/**"
      - ".github/workflows/materials.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: materials-${{ github.ref }}
  cancel-in-progress: true

jobs:
  existing-mechanical-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Existing material gates (kept during migration)
        run: |
          node toolkit/hooks/check-placeholders.mjs
          node toolkit/hooks/check-notebooks.mjs
          node toolkit/hooks/check-links.mjs
          node toolkit/hooks/check-public-content.mjs
      - name: Existing negative fixtures and regression tests
        run: |
          node toolkit/hooks/check-placeholders.mjs --self-test
          node toolkit/hooks/check-notebooks.mjs --self-test
          node toolkit/hooks/check-links.mjs --self-test
          node toolkit/hooks/check-public-content.mjs --self-test
          node --test toolkit/hooks/hooks.test.mjs
      - name: Existing publication smoke
        run: node toolkit/hooks/check-links.mjs --publication-smoke

  site-incremental:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deterministic diagram and browser toolchains
        run: |
          npm ci --prefix toolkit/material-site
          npm ci --prefix reference-app
          npm --prefix reference-app exec playwright install --with-deps chromium
      - name: Clean incremental accepted-content build
        run: node toolkit/material-site/build-site.mjs --clean --out .site --phase incremental
      - name: Incremental SITE-CI commands
        run: |
          node toolkit/material-site/check-manifest.mjs --source . --site .site --phase foundation
          node toolkit/material-site/check-links.mjs --source . --site .site --file-protocol --phase foundation
          node toolkit/material-site/check-boundary.mjs --source . --site .site --phase foundation
          node toolkit/material-site/check-glossary.mjs --source materials/fogalomtar/glossary.json --site .site --phase foundation
          node toolkit/material-site/check-search.mjs --site .site --phase foundation
          node toolkit/material-site/check-diagrams.mjs --source . --site .site --phase incremental
          node --test toolkit/material-site/*.test.mjs
          node toolkit/material-site/check-render.mjs --site .site --modes desktop,mobile,print,no-js,reduced-motion,file --phase foundation
      - name: Upload generated participant site only
        uses: actions/upload-pages-artifact@v4
        with:
          path: .site

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: site-incremental
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy validated participant site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  existing-render-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install the repo-locked browser toolchain
        run: |
          npm ci --prefix reference-app
          npm --prefix reference-app exec playwright install --with-deps chromium
      - name: Render existing notebooks during migration
        run: node toolkit/material-qa/material-qa.mjs materials/notebooks --out "$RUNNER_TEMP/material-qa"
      - name: Upload render evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: material-qa-evidence
          path: ${{ runner.temp }}/material-qa
          retention-days: 14

  application-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [reference-app, participant-starter]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  legacy-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Run the unchanged legacy characterization suite
        run: dotnet test toolkit/legacy-playbook/sample/LegacyShop.Tests/LegacyShop.Tests.csproj --configuration Release
