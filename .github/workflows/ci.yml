name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the still-running older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [reference-app, participant-starter]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      # This is the single type gate: `next build` skips its own type check
      # (typescript.ignoreBuildErrors in next.config.ts) so types are checked once.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
