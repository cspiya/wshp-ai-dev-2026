name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reference-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: reference-app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  participant-starter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: participant-starter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: participant-starter/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
